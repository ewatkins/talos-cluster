---
apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  labels:
    # Subnet-router / exit-node proxy pods spawned by the operator need
    # NET_ADMIN and /dev/net/tun, which Talos's default baseline PodSecurity
    # blocks. Isolate that privilege here instead of loosening `network`.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
