---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tailscale
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  path: ./kubernetes/apps/network/tailscale/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: talos-cluster
    namespace: flux-system
  targetNamespace: tailscale
  timeout: 5m
  wait: true # Connector CRD must exist before the connector Kustomization applies
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tailscale-connector
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: tailscale
  interval: 1h
  path: ./kubernetes/apps/network/tailscale/connector
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: talos-cluster
    namespace: flux-system
  targetNamespace: tailscale
  timeout: 5m
  wait: false
