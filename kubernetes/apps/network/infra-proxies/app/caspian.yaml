---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: caspian
  namespace: network
spec:
  endpoints:
    - ip:
        address: 10.35.10.10
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: caspian
  namespace: network
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: caspian
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: caspian-ca
    hostname: Caspian.local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: caspian
  namespace: network
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.ewatkins.dev"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames: ["caspian.ewatkins.dev"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: caspian
