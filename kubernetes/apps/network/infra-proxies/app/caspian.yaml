# Caspian (Unraid NAS) speaks HTTPS on :443 with a self-signed cert
# (CN/SAN Caspian.local), so Envoy needs that cert as the trust anchor and
# must use Caspian.local as the SNI/validation hostname when connecting.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caspian-ca
  namespace: network
data:
  ca.crt: |
