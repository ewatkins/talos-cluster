---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: sab
  namespace: network
spec:
  endpoints:
    - ip:
        address: 10.45.10.14
        port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sab
  namespace: network
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.ewatkins.dev"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames: ["sab.ewatkins.dev"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: sab
