---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: duplicacy
  namespace: network
spec:
  endpoints:
    - ip:
        address: 10.35.10.13
        port: 3875
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: duplicacy
  namespace: network
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.ewatkins.dev"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames: ["duplicacy.ewatkins.dev"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: duplicacy
