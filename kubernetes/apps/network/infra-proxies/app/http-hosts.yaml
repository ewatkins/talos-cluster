# Reverse proxies for non-cluster homelab services that used to live on the
# NPMplus LXC. Each host is an Envoy Gateway Backend (off-cluster IP) exposed
# via an HTTPRoute on the internal gateway. TLS is terminated by the gateway's
# *.ewatkins.dev wildcard cert; external-dns publishes the DNS record.
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: atlas
  namespace: network
spec:
  endpoints:
    - ip:
        address: 10.50.1.101
        port: 8100
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: atlas
  namespace: network
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.ewatkins.dev"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames: ["atlas.ewatkins.dev"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: atlas
---
