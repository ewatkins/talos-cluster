---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy-internal
  namespace: network
spec:
  # caspian's nginx only accepts P-384 for ECDHE; Envoy's default curve list
  # (X25519, P-256) has no overlap, so backend TLS handshakes fail without it.
  backendTLS:
    ecdhCurves: ["X25519", "P-256", "P-384"]
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1
        container:
          resources:
            requests:
              cpu: 100m
            limits:
              memory: 512Mi
      envoyService:
        externalTrafficPolicy: Cluster
        annotations:
          io.cilium/lb-ipam-ips: "${INTERNAL}"
          external-dns.alpha.kubernetes.io/hostname: "internal.ewatkins.dev"
