---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: network
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Enable the Backend API so HTTPRoutes can target off-cluster IPs
    # (used by infra-proxies to reverse-proxy non-cluster homelab services).
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
