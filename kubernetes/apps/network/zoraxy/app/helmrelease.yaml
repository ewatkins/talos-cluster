---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zoraxy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      zoraxy:
        annotations:
          reloader.stakater.com/search: "true"
        # Single writer to the config PVC; never run two at once.
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/zoraxydocker/zoraxy
              tag: v3.3.3
            # Serve the management UI on 8000; the reverse-proxy listeners
            # (80/443) are unused for this GUI test.
            args: ["-port=:8000"]
            env:
              TZ: America/New_York
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8000

    persistence:
      config:
        existingClaim: zoraxy-config
        globalMounts:
          - path: /opt/zoraxy/config
