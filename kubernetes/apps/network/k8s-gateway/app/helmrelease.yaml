---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
spec:
  interval: 30m
  chart:
    spec:
      chart: k8s-gateway
      version: 2.4.0
      sourceRef:
        kind: HelmRepository
        name: k8s-gateway
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: k8s-gateway
    domain: "ewatkins.dev"
    ttl: 1
    service:
      type: LoadBalancer
      port: 53
      annotations:
        io.cilium/lb-ipam-ips: "${K8S_GATEWAY}"
      externalTrafficPolicy: Cluster
    watchedResources: ["Ingress", "Service"]
    fallthrough:
      enabled: true
    extraZonePlugins:
      - name: log
      - name: errors
      - name: health
        configBlock: |-
          lameduck 5s
      - name: ready
      - name: prometheus
        parameters: 0.0.0.0:9153
      - name: hosts
        configBlock: |-
          10.40.0.30 keycloak.ewatkins.dev
          10.40.0.30 auth.ewatkins.dev
          10.40.0.30 status.ewatkins.dev
          10.40.0.30 kromgo.ewatkins.dev
          10.40.0.30 flux-webhook.ewatkins.dev
          fallthrough
      - name: forward
        parameters: . /etc/resolv.conf
      - name: loop
      - name: reload
      - name: loadbalance
