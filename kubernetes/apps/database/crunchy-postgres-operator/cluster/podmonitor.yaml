---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: &name postgres
spec:
  jobLabel: *name
  namespaceSelector:
    matchNames:
      - database
  podMetricsEndpoints:
    - honorLabels: true
      path: /metrics
      port: exporter
      relabelings:
        - sourceLabels:
            [
              "__meta_kubernetes_namespace",
              "__meta_kubernetes_pod_label_postgres_operator_crunchydata_com_cluster",
            ]
          targetLabel: pg_cluster
          separator: "/"
          replacement: "$1$2"
        - sourceLabels:
            [
              __meta_kubernetes_pod_label_postgres_operator_crunchydata_com_instance,
            ]
          targetLabel: deployment
        - sourceLabels:
            [__meta_kubernetes_pod_label_postgres_operator_crunchydata_com_role]
          targetLabel: role
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: instance
  selector:
    matchLabels:
      # Match the exporter label only (not a specific cluster) so both
      # crunchy-postgres and crunchy-postgres-vector are scraped. The
      # previous `cluster: postgres` selector matched nothing — the real
      # label value is `crunchy-postgres` — so no metrics were collected.
      postgres-operator.crunchydata.com/crunchy-postgres-exporter: "true"
