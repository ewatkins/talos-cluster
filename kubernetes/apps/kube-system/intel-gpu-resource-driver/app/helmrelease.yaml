---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  interval: 30m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    nodeFeatureRules:
      enabled: true
    cdi:
      staticPath: /var/cdi/static
      dynamicPath: /var/cdi/dynamic
