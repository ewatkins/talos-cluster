---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app code-server
  namespace: flux-system
spec:
  targetNamespace: development
  components:
    - ../../../../components/gatus/internal
  path: ./kubernetes/apps/development/code-server/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: talos-cluster
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      GATUS_SUBDOMAIN: code
      # oauth2-proxy's own health endpoint: unauthenticated and no redirect.
      # Probing / instead would follow the login redirect to Keycloak and end up
      # asserting Keycloak is up, not code-server. The pod leaves the Service
      # endpoints if any container goes unready, so this still catches an outage.
      GATUS_PATH: /ping
