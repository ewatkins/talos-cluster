---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: code-server
  namespace: development
  # No external-dns target annotation: unifi-dns publishes an A record from
  # the parent gateway's own address (${CODE_SERVER}).
spec:
  parentRefs:
    - name: code
      namespace: network
      sectionName: https
  hostnames:
    - "code.ewatkins.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Strict-Transport-Security
                value: "max-age=31449600; includeSubDomains"
      timeouts:
        # code-server holds long-lived websocket connections for the editor session
        request: "0s"
        backendRequest: "0s"
      backendRefs:
        - name: code-server
          port: 8080
