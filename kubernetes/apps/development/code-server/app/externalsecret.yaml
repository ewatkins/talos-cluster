---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: code-server-secret
  namespace: development
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: code-server-secret
    template:
      engineVersion: v2
      data:
        # Consumed by the Envoy Gateway SecurityPolicy (Keycloak OIDC)
        client-secret: "{{ .CODE_SERVER_OIDC_CLIENT_SECRET }}"
        # Sourced from the `sops-age` Bitwarden item, which the flux-system
        # PushSecret keeps in sync with the live key, so a rotation lands here
        # with no manual copy. Stored base64-encoded (the key file is multi-line).
        # talosconfig is deliberately not stored anywhere: `talhelper genconfig`
        # regenerates it from talsecret.sops.yaml using this key.
        age.key: "{{ .age_agekey | b64dec }}"
  dataFrom:
    - extract:
        key: code-server-secret
    - extract:
        key: sops-age
