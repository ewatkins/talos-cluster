---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app code-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  # The first install downloads the toolchain before the pod can go Ready;
  # the default 5m wait is not enough and its remediation uninstalls the release.
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      code-server:
        annotations:
          reloader.stakater.com/search: "true"
        strategy: Recreate
        serviceAccount:
          # Defined in rbac.yaml, bound to cluster-admin
          name: code-server
        initContainers:
          # Installs the CLI toolchain onto the PVC at ~/.local/bin, keyed by the
          # version marker below. Downloads come straight from each project's
          # release URL: an installer-redirector service (i.jpillora.com, as used
          # by `task workstation:generic-linux`) is a hard dependency for every
          # pod start, and the pod cannot schedule while it is down.
          #
          # A restart with a matching marker skips the install entirely, so the
          # pod also starts with no network at all.
          tools:
            image:
              repository: docker.io/library/alpine
              tag: 3.22.2
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                TALHELPER=v3.1.13
                AGE=v1.3.1
                FLUX=2.9.2
                SOPS=v3.13.2
                TASK=v3.52.0
                HELMFILE=1.7.0
                JQ=jq-1.8.2
                KUSTOMIZE=v5.8.1
                YQ=v4.53.3
                TALOSCTL=v1.13.6
                KUBECONFORM=v0.8.0
                KUBECTL=v1.36.2
                HELM=v3.21.3

                BIN=/home/ewatkins/.local/bin
                MARKER="$${BIN}/.toolchain"
                STAMP="$${TALHELPER} $${AGE} $${FLUX} $${SOPS} $${TASK} $${HELMFILE} $${JQ} $${KUSTOMIZE} $${YQ} $${TALOSCTL} $${KUBECONFORM} $${KUBECTL} $${HELM}"

                # The PVC is provisioned root-owned; code-server runs as uid 1000.
                # .config is repaired too: an earlier revision mounted a secret
                # under it, which left it owned by root on the volume.
                mkdir -p "$${BIN}" /home/ewatkins/.config
                chown 1000:1000 /home/ewatkins /home/ewatkins/.local /home/ewatkins/.config "$${BIN}"
                # sshd StrictModes rejects a group/world-writable home
                chmod 0755 /home/ewatkins

                if [ -f "$${MARKER}" ] && [ "$$(cat "$${MARKER}")" = "$${STAMP}" ]; then
                  echo "toolchain up to date, skipping install"
                  exit 0
                fi

                apk add --no-cache curl tar >/dev/null
                cd "$${BIN}"

                # Single binaries
                curl -fsSL -o sops       "https://github.com/getsops/sops/releases/download/$${SOPS}/sops-$${SOPS}.linux.amd64"
                curl -fsSL -o jq         "https://github.com/jqlang/jq/releases/download/$${JQ}/jq-linux-amd64"
                curl -fsSL -o yq         "https://github.com/mikefarah/yq/releases/download/$${YQ}/yq_linux_amd64"
                curl -fsSL -o talosctl   "https://github.com/siderolabs/talos/releases/download/$${TALOSCTL}/talosctl-linux-amd64"
                curl -fsSL -o kubectl    "https://dl.k8s.io/release/$${KUBECTL}/bin/linux/amd64/kubectl"

                # Tarballs: extract just the binary we want
                curl -fsSL "https://github.com/budimanjojo/talhelper/releases/download/$${TALHELPER}/talhelper_linux_amd64.tar.gz"            | tar xz talhelper
                curl -fsSL "https://github.com/FiloSottile/age/releases/download/$${AGE}/age-$${AGE}-linux-amd64.tar.gz"                      | tar xz --strip-components=1 age/age age/age-keygen
                curl -fsSL "https://github.com/fluxcd/flux2/releases/download/v$${FLUX}/flux_$${FLUX}_linux_amd64.tar.gz"                     | tar xz flux
                curl -fsSL "https://github.com/go-task/task/releases/download/$${TASK}/task_linux_amd64.tar.gz"                               | tar xz task
                curl -fsSL "https://github.com/helmfile/helmfile/releases/download/v$${HELMFILE}/helmfile_$${HELMFILE}_linux_amd64.tar.gz"    | tar xz helmfile
                curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F$${KUSTOMIZE}/kustomize_$${KUSTOMIZE}_linux_amd64.tar.gz" | tar xz kustomize
                curl -fsSL "https://github.com/yannh/kubeconform/releases/download/$${KUBECONFORM}/kubeconform-linux-amd64.tar.gz"            | tar xz kubeconform
                curl -fsSL "https://get.helm.sh/helm-$${HELM}-linux-amd64.tar.gz"                                                             | tar xz --strip-components=1 linux-amd64/helm

                chmod 0755 *
                echo "$${STAMP}" > "$${MARKER}"
                chown -R 1000:1000 "$${BIN}"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi
        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.128.0
            args:
              # Authentication is handled by Keycloak at the gateway, not by code-server.
              - --auth
              - none
              - --bind-addr
              - 0.0.0.0:8080
              - /home/ewatkins
            env:
              TZ: America/New_York
              # The image bakes HOME=/home/coder (the passwd entry for uid 1000);
              # override it so everything lands on the PVC mounted at /home/ewatkins.
              HOME: /home/ewatkins
              PATH: /home/ewatkins/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              SOPS_AGE_KEY_FILE: /var/run/secrets/sops/age.key
              # Written by `talhelper genconfig`; not stored as a secret
              TALOSCONFIG: /home/ewatkins/talos-cluster/talos/clusterconfig/talosconfig
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe
            securityContext:
              # Deliberately permissive: this is an interactive dev environment and
              # `sudo apt-get install` needs setuid to work.
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 8Gi
          # SSH access from the LAN (scp/rsync, VS Code Remote-SSH). s6 starts
          # as root and drops to PUID; a custom-cont-init script moves the user
          # home from /config to /home/ewatkins, so logins land in the real
          # home and authorized_keys is ~/.ssh/authorized_keys on the PVC —
          # manageable from the IDE itself.
          ssh:
            image:
              repository: lscr.io/linuxserver/openssh-server
              tag: 10.3_p1-r0-ls231
            env:
              TZ: America/New_York
              PUID: "1000"
              PGID: "1000"
              USER_NAME: ewatkins
              PASSWORD_ACCESS: "false"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi

    defaultPodOptions:
      # Stable shell hostname (ewatkins@code) instead of the generated pod name
      hostname: code
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
          # Backend for the code gateway's TCP:22 listener (TCPRoute)
          ssh:
            port: 2222

    persistence:
      config:
        existingClaim: code-server-config
        globalMounts:
          - path: /home/ewatkins
      # Rename uid/gid 1000 from the image's `coder` to `ewatkins` (prompt,
      # whoami, ls -l). Split in two because sudoers must be 0440.
      identity:
        type: configMap
        name: code-server-identity
        defaultMode: 0644
        advancedMounts:
          code-server:
            app:
              - path: /etc/passwd
                subPath: passwd
                readOnly: true
              - path: /etc/group
                subPath: group
                readOnly: true
      # sshd host keys persist across restarts (subdir of the home PVC), and
      # the home-move script runs via the lsio custom-cont-init hook.
      ssh-config:
        existingClaim: code-server-config
        advancedMounts:
          code-server:
            ssh:
              - path: /config
                subPath: .ssh-server
      ssh-init:
        type: configMap
        name: code-server-identity
        defaultMode: 0755
        advancedMounts:
          code-server:
            ssh:
              - path: /custom-cont-init.d/10-home.sh
                subPath: ssh-home.sh
                readOnly: true
      identity-sudoers:
        type: configMap
        name: code-server-identity
        defaultMode: 0440
        advancedMounts:
          code-server:
            app:
              - path: /etc/sudoers.d/nopasswd
                subPath: nopasswd
                readOnly: true
              # PAM validates sudo accounts against shadow; without this entry
              # sudo fails with "account validation failure".
              - path: /etc/shadow
                subPath: shadow
                readOnly: true
      secret:
        type: secret
        name: code-server-secret
        defaultMode: 0400
        # Mounted outside $HOME on purpose: a mount inside the home PVC makes the
        # kubelet create its parent dirs as root, and code-server (uid 1000) then
        # cannot create /home/ewatkins/.config/code-server.
        advancedMounts:
          code-server:
            app:
              - path: /var/run/secrets/sops/age.key
                subPath: age.key
                readOnly: true
