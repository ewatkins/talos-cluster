---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app code-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      code-server:
        annotations:
          reloader.stakater.com/search: "true"
        strategy: Recreate
        serviceAccount:
          # Defined in rbac.yaml, bound to cluster-admin
          name: code-server
        initContainers:
          # Installs the same CLI toolchain as `task workstation:generic-linux`
          # into an emptyDir on PATH, so tools are refreshed on every pod start
          # rather than going stale on the PVC.
          tools:
            image:
              repository: docker.io/library/alpine
              tag: 3.22.2
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                apk add --no-cache bash curl tar >/dev/null
                # The PVC is provisioned root-owned; code-server runs as uid 1000.
                chown 1000:1000 /home/coder
                cd /tools
                for pkg in \
                  budimanjojo/talhelper?as=talhelper \
                  FiloSottile/age?as=age \
                  fluxcd/flux2?as=flux \
                  getsops/sops?as=sops \
                  go-task/task?as=task \
                  helmfile/helmfile?as=helmfile \
                  jqlang/jq?as=jq \
                  kubernetes-sigs/kustomize?as=kustomize \
                  mikefarah/yq?as=yq \
                  siderolabs/talos?as=talosctl \
                  yannh/kubeconform?as=kubeconform
                do
                  curl -fsSL "https://i.jpillora.com/${pkg}&type=script" | bash
                done
                curl -fsSL -o kubectl \
                  "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 \
                  | USE_SUDO="false" HELM_INSTALL_DIR="/tools" bash
                chmod -R 0755 /tools
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi
        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.128.0
            args:
              # Authentication is handled by Keycloak at the gateway, not by code-server.
              - --auth
              - none
              - --bind-addr
              - 0.0.0.0:8080
              - /home/coder/workspace
            env:
              TZ: America/New_York
              PATH: /tools:/home/coder/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              SOPS_AGE_KEY_FILE: /home/coder/.config/sops/age/keys.txt
              # Written by `talhelper genconfig`; not stored as a secret
              TALOSCONFIG: /home/coder/workspace/talos-cluster/talos/clusterconfig/talosconfig
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe
            securityContext:
              # Deliberately permissive: this is an interactive dev environment and
              # `sudo apt-get install` needs setuid to work.
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 8Gi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080

    persistence:
      config:
        existingClaim: code-server-config
        globalMounts:
          - path: /home/coder
      tools:
        type: emptyDir
        globalMounts:
          - path: /tools
      secret:
        type: secret
        name: code-server-secret
        defaultMode: 0400
        advancedMounts:
          code-server:
            app:
              - path: /home/coder/.config/sops/age/keys.txt
                subPath: age.key
                readOnly: true
