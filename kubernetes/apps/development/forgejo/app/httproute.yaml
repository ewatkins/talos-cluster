---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  namespace: development
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.ewatkins.dev"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames:
    - "git.ewatkins.dev"
  rules:
    # Forgejo has no setting to skip its login page, which only offers the
    # single Keycloak button; send browsers straight into the OIDC flow.
    # GET only, so other verbs and paths under /user/login are unaffected.
    - matches:
        - path:
            type: Exact
            value: /user/login
          method: GET
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /user/oauth2/Keycloak
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Strict-Transport-Security
                value: "max-age=31449600; includeSubDomains"
      backendRefs:
        - name: forgejo-http
          port: 3000
