apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name forgejo-admin-secret
  namespace: development
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        email: "{{ .email }}"
  dataFrom:
    - extract:
        key: *name
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name forgejo-security
  namespace: development
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        secret-key: "{{ .secret_key }}"
        internal-token: "{{ .internal_token }}"
  dataFrom:
    - extract:
        key: *name
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name forgejo-oauth-secret
  namespace: development
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        # Key names are fixed by the forgejo chart's gitea.oauth existingSecret contract
        key: "{{ .client_id }}"
        secret: "{{ .client_secret }}"
  dataFrom:
    - extract:
        key: *name
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name forgejo-bucket
  namespace: development
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        access-key-id: '{{ index . "garage-access-key-id" }}'
        secret-access-key: '{{ index . "garage-secret-access-key" }}'
  dataFrom:
    - extract:
        key: *name
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name forgejo-db
  namespace: development
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        POSTGRES_DBNAME: '{{ index . "dbname" }}'
        POSTGRES_HOST: '{{ index . "pgbouncer-host" }}'
        POSTGRES_USER: '{{ index . "user" }}'
        POSTGRES_PASS: '{{ index . "password" }}'
        POSTGRES_PORT: '{{ index . "pgbouncer-port" }}'
  dataFrom:
    - extract:
        key: crunchy-postgres-pguser-forgejo-admin
