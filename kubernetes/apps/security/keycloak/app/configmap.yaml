---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-theme
  namespace: security
data:
  theme.properties: |
    parent=keycloak
    import=common/keycloak
    styles=css/login.css

  login.css: |
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    /* ── Reset ── */
    html, body {
      margin: 0;
      height: 100%;
      background: #0d1117 !important;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    /* ── Hide default header / realm name ── */
    #kc-header,
    #kc-header-wrapper {
      display: none !important;
    }

    /* ── Full-viewport background via pseudo-element ── */
    .login-pf-page {
      position: relative;
      min-height: 100vh !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 2rem !important;
    }

    .login-pf-page::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920&q=85&fit=crop')
        center center / cover no-repeat;
    }

    .login-pf-page::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* ── Frosted card ── */
    .card-pf {
      position: relative;
      z-index: 1;
      background: rgba(15, 18, 22, 0.65) !important;
      backdrop-filter: blur(20px) saturate(160%) !important;
      -webkit-backdrop-filter: blur(20px) saturate(160%) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 16px !important;
      padding: 2.75rem 2.5rem 2.25rem !important;
      width: 100%;
      max-width: 400px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 60px rgba(0,0,0,0.6) !important;
      animation: rise 0.5s cubic-bezier(.16,1,.3,1) both;
    }

    /* Subtle top highlight */
    .card-pf::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      border-radius: 100px;
      pointer-events: none;
    }

    /* ── Reset inner content box ── */
    #kc-content {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      backdrop-filter: none !important;
      border-radius: 0 !important;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand header — replace "Sign in to your account" ── */
    #kc-page-title {
      font-size: 0 !important;
      text-align: center;
      margin-bottom: 1.75rem !important;
    }

    #kc-page-title::before {
      content: 'ewatkins.dev';
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.15rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 0.35rem;
    }

    #kc-page-title::after {
      content: 'sign in to continue';
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.02em;
    }

    /* ── Form labels ── */
    label.pf-c-form__label {
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.77rem !important;
      font-weight: 500 !important;
      letter-spacing: normal !important;
      text-transform: none !important;
    }

    /* ── Inputs ── */
    input.pf-c-form-control {
      background: rgba(0,0,0,0.3) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-radius: 8px !important;
      color: #fff !important;
      padding: 0.65rem 0.9rem !important;
      font-size: 0.88rem !important;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s !important;
    }

    input.pf-c-form-control:focus {
      background: rgba(0,0,0,0.4) !important;
      border-color: rgba(255,255,255,0.35) !important;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06) !important;
      outline: none !important;
    }

    /* ── Browser autofill override ── */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px rgba(8, 15, 28, 0.95) inset !important;
      -webkit-text-fill-color: #fff !important;
    }

    /* ── Password input group (input + toggle button) ── */
    .pf-c-input-group {
      background: transparent !important;
    }

    .pf-c-input-group input.pf-c-form-control {
      border-radius: 8px 0 0 8px !important;
    }

    /* ── Password toggle button ── */
    button.pf-m-control,
    .pf-c-input-group button {
      background: rgba(0,0,0,0.3) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-left: none !important;
      border-radius: 0 8px 8px 0 !important;
      color: rgba(255,255,255,0.5) !important;
      outline: none !important;
      box-shadow: none !important;
      --pf-c-button--after--BorderColor: transparent !important;
    }

    /* ── Submit button (white) ── */
    input#kc-login {
      width: 100% !important;
      margin-top: 0.5rem !important;
      padding: 0.7rem 1.5rem !important;
      background: rgba(255,255,255,0.92) !important;
      border: none !important;
      border-radius: 8px !important;
      color: #111 !important;
      font-weight: 600 !important;
      font-size: 0.88rem !important;
      letter-spacing: 0.01em !important;
      cursor: pointer !important;
      transition: background 0.15s, box-shadow 0.15s !important;
    }

    input#kc-login:hover {
      background: #fff !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
    }

    input#kc-login:active {
      background: rgba(255,255,255,0.8) !important;
    }

    /* ── "or continue with" divider ── */
    #kc-social-providers {
      margin-top: 1.5rem;
    }

    /* Hide Keycloak's own "Or sign in with" heading */
    #kc-social-providers h4,
    #kc-social-providers h5,
    #kc-social-providers p,
    #kc-social-providers > div:first-child {
      display: none !important;
    }

    #kc-social-providers::before {
      content: 'or continue with';
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.02em;
      margin-bottom: 1.1rem;
    }

    /* ── Social provider buttons ── */
    #kc-social-providers ul {
      display: flex !important;
      gap: 0.6rem !important;
      list-style: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    #kc-social-providers ul li {
      flex: 1 !important;
    }

    #kc-social-providers ul li a {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 0.5rem !important;
      background: rgba(255,255,255,0.06) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 8px !important;
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.8rem !important;
      font-weight: 500 !important;
      padding: 0.58rem 0.75rem !important;
      text-decoration: none !important;
      transition: background 0.15s, border-color 0.15s, color 0.15s !important;
    }

    #kc-social-providers ul li a:hover {
      background: rgba(255,255,255,0.1) !important;
      border-color: rgba(255,255,255,0.2) !important;
      color: rgba(255,255,255,0.85) !important;
    }

    /* ── Links ── */
    .login-pf-page a,
    #kc-form-options .checkbox label,
    #kc-form-options a {
      color: rgba(148, 190, 230, 0.70) !important;
      font-size: 0.82rem !important;
    }

    #kc-form-options a:hover {
      color: rgba(255,255,255,0.8) !important;
    }

    /* ── Alert / error messages ── */
    .alert {
      background: rgba(239, 68, 68, 0.15) !important;
      border: 1px solid rgba(239, 68, 68, 0.30) !important;
      border-radius: 8px !important;
      color: #fca5a5 !important;
      padding: 0.75rem 1rem !important;
      margin-bottom: 1rem !important;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.12) !important;
      border-color: rgba(34, 197, 94, 0.25) !important;
      color: #86efac !important;
    }

    /* ── Hide "powered by Keycloak" footer ── */
    #kc-info .instruction,
    #powered-by-keycloak,
    .login-pf-page .pf-l-bullseye + * {
      display: none !important;
    }
