---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: security
spec:
  parentRefs:
    - name: external
      namespace: network
      sectionName: https
  hostnames:
    - "keycloak.ewatkins.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Strict-Transport-Security
                value: "max-age=31449600; includeSubDomains"
            set:
              - name: Alt-Svc
                value: "none"
      backendRefs:
        - name: keycloak
          port: 80
