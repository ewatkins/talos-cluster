---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name keycloak-admin-secret
  namespace: security
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        password: "{{ .KC_ADMIN_PASSWORD }}"
  dataFrom:
    - extract:
        key: *name
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name keycloak-db-secret
  namespace: security
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        jdbc-uri: '{{ index . "jdbc-uri" }}'
  dataFrom:
    - extract:
        key: crunchy-postgres-pguser-keycloak-admin
