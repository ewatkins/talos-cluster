---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name patchmon-db-secret
  namespace: security
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres
  target:
    name: *name
    template:
      engineVersion: v2
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        # Prisma / app connection string (via pgbouncer)
        DATABASE_URL: "postgresql://{{ index . \"user\" }}:{{ index . \"password\" }}@{{ index . \"pgbouncer-host\" }}:{{ index . \"pgbouncer-port\" }}/{{ index . \"dbname\" }}"
        # Individual vars used by the container entrypoint's DB readiness check
        POSTGRES_HOST: '{{ index . "pgbouncer-host" }}'
        POSTGRES_PORT: '{{ index . "pgbouncer-port" }}'
        POSTGRES_USER: '{{ index . "user" }}'
        POSTGRES_PASSWORD: '{{ index . "password" }}'
        POSTGRES_DB: '{{ index . "dbname" }}'
  dataFrom:
    - extract:
        key: crunchy-postgres-pguser-patchmon-admin
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name patchmon-secret
  namespace: security
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        # Copy these verbatim from the LXC's .env into the Bitwarden item.
        # SESSION_SECRET and AI_ENCRYPTION_KEY decrypt data already in the DB,
        # so they MUST match the old install.
        JWT_SECRET: "{{ .JWT_SECRET }}"
        SESSION_SECRET: "{{ .SESSION_SECRET }}"
        AI_ENCRYPTION_KEY: "{{ .AI_ENCRYPTION_KEY }}"
  dataFrom:
    - extract:
        key: *name
