---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name immich-db-secret
  namespace: media
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres
  target:
    name: *name
    template:
      engineVersion: v2
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        DB_URL: '{{ index . "pgbouncer-uri" }}'
  dataFrom:
    - extract:
        key: crunchy-postgres-pguser-immich-admin
