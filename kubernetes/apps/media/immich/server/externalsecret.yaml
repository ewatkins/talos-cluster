---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name immich-db-secret
  namespace: media
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres
  target:
    name: *name
    template:
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
  data:
    - secretKey: DB_URL
      remoteRef:
        key: crunchy-postgres-vector-pguser-immich
        property: uri
