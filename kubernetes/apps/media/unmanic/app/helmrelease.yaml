---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unmanic
  namespace: media
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      unmanic:
        containers:
          app:
            image:
              repository: docker.io/josh5/unmanic
              tag: 0.4.0.post23@sha256:3751881e8129e412c64453e6d11ff3fb1469121eeb271c73ad63f925a9f5c910
            env:
              TZ: ${TIMEZONE}
              PUID: "1000"
              PGID: "1000"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8888
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
            resources:
              # DRA-injected Intel GPU (gpu.intel.com) for QSV/VAAPI encode
              claims:
                - name: gpu
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: unmanic
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 1000
            supplementalGroups:
              - 44
              - 105
              - 10000
    service:
      app:
        controller: unmanic
        ports:
          http:
            port: 8888
    ingress:
      app:
        enabled: false
    persistence:
      config:
        existingClaim: unmanic-config
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: storage.ewatkins.dev
        path: /mnt/user/arrdata
        globalMounts:
          - path: /library
      cache:
        type: emptyDir
        globalMounts:
          - path: /tmp/unmanic
      tmp:
        type: emptyDir
