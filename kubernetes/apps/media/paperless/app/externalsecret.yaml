---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name paperless-db-secret
  namespace: media
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres
  target:
    name: *name
    template:
      engineVersion: v2
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        # Paperless DB
        PAPERLESS_DBNAME: '{{ index . "dbname" }}'
        PAPERLESS_DBHOST: '{{ index . "pgbouncer-host" }}'
        PAPERLESS_DBUSER: '{{ index . "user" }}'
        PAPERLESS_DBPASS: '{{ index . "password" }}'
        PAPERLESS_DBPORT: '{{ index . "pgbouncer-port" }}'
  dataFrom:
    - extract:
        key: crunchy-postgres-pguser-paperless-admin
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name paperless-config-secret
  namespace: media
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        # App
        PAPERLESS_ADMIN_USER: "{{ .PAPERLESS_ADMIN_USER }}"
        PAPERLESS_ADMIN_PASSWORD: "{{ .PAPERLESS_ADMIN_PASSWORD }}"
        PAPERLESS_SECRET_KEY: "{{ .PAPERLESS_SECRET_KEY }}"
        # SMTP
        PAPERLESS_EMAIL_HOST: "{{ .smtp_host }}"
        PAPERLESS_EMAIL_PORT: "{{ .smtp_port }}"
        PAPERLESS_EMAIL_HOST_USER: "{{ .smtp_username }}"
        PAPERLESS_EMAIL_HOST_PASSWORD: "{{ .smtp_password }}"
        PAPERLESS_EMAIL_USE_SSL: "{{ .smtp_secure }}"
        # OIDC
        PAPERLESS_SOCIALACCOUNT_PROVIDERS: |
          {"openid_connect": {"APPS": [{"provider_id": "keycloak", "name": "Keycloak", "client_id": "{{ .oidc_client_id }}", "secret": "{{ .oidc_client_secret }}", "settings": {"server_url": "https://auth.ewatkins.dev/realms/master/.well-known/openid-configuration"}}]}}
  dataFrom:
    - extract:
        key: *name
    - extract:
        key: smtp
