---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pulse
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      pulse:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/rcourtman/pulse
              tag: 5.1.24@sha256:e674f36fedc53a48f78b4a660b8215a444f7b06f8e42ebf6b08b797fd4d329a3
            env:
              TZ: America/Chicago
              FRONTEND_PORT: 7655
              BACKEND_PORT: 7655
              PULSE_PUBLIC_URL: "https://pulse.ewatkins.dev"
              OIDC_USERNAME_CLAIM: "preferred_username"
            envFrom:
              - secretRef:
                  name: pulse-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 7655
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 256Mi
        serviceAccount:
          identifier: pulse
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: pulse
        annotations:
          io.cilium/lb-ipam-ips: "${PULSE}"
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 7655
    serviceMonitor:
      main:
        enabled: false
        serviceName: pulse
        endpoints:
          - port: http
    ingress:
      app:
        enabled: false
    serviceAccount:
      pulse: {}
    persistence:
      pulse-data:
        enabled: true
        existingClaim: pulse-data
        globalMounts:
          - path: /data
