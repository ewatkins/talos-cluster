---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.12.3
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: openebs
      namespace: storage
    - name: thanos
      namespace: observability
  valuesFrom:
    - kind: ConfigMap
      name: kube-state-metrics-config
      valuesKey: kube-state-metrics.yaml
  values:
    ## ref: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
    fullnameOverride: kps
    cleanPrometheusOperatorObjectNames: true

    crds:
      enabled: true

    alertmanager:
      enabled: true
      fullnameOverride: alertmanager

      alertmanagerSpec:
        replicas: 2
        retention: 72h
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-slow
              resources:
                requests:
                  storage: 1Gi
        useExistingSecret: true
        configSecret: alertmanager-secret
        resources:
          requests:
            cpu: 11m
            memory: 53M
          limits:
            memory: 53M

      ingress:
        enabled: false

    kubelet:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          # Drop high cardinality labels
          - action: labeldrop
            regex: (uid)
          - action: labeldrop
            regex: (id|name)
          - action: drop
            sourceLabels: [__name__]
            regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)

    kubeApiServer:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          # Drop high cardinality labels
          - action: drop
            sourceLabels: [__name__]
            regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
          - action: drop
            sourceLabels: [__name__]
            regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)

    kubeControllerManager:
      enabled: true
      endpoints: &cp
        - 10.40.1.1
        - 10.40.1.2
        - 10.40.1.3

    kubeEtcd:
      enabled: true
      endpoints: *cp
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      serviceMonitor:
        metricRelabelings:
          - action: drop
            sourceLabels: ["__name__"]
            regex: (etcd_request_duration_seconds_bucket|etcd_request_duration_seconds_sum|etcd_request_duration_seconds_count)

    kubeScheduler:
      enabled: true
      endpoints: *cp

    kubeProxy:
      enabled: false

    prometheus:
      enabled: true
      fullNameOverride: prometheus

      ingress:
        enabled: false

      thanosService:
        enabled: true

      thanosServiceMonitor:
        enabled: true

      prometheusSpec:
        podMetadata:
          annotations:
            # Watch the objstore secret the Thanos sidecar actually reads (generated
            # by the thanos chart) so endpoint/cred changes restart Prometheus.
            secret.reloader.stakater.com/reload: thanos-objstore-config
        replicas: 1
        replicaExternalLabelName: __replica__
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - auto-gomemlimit
          - memory-snapshot-on-shutdown
          - new-service-discovery-manager
        image:
          registry: quay.io
          repository: prometheus/prometheus
          tag: v2.54.0-dedupelabels
        thanos:
          objectStorageConfig:
            existingSecret:
              name: thanos-objstore-config
              key: config
        retention: 2d
        # Keep the on-disk block size well under the PVC request. retentionSize
        # only bounds persisted blocks, not the WAL, so leave generous headroom.
        retentionSize: 15GiB
        externalLabels:
          cluster: talos-cluster
        resources:
          requests:
            cpu: 100m
            # Reserve memory so the scheduler accounts for WAL replay, which is
            # memory-hungry. Missing requests let the pod get OOM/evicted and
            # crash-loop before it can compact + truncate the WAL.
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            # Headroom above the request so WAL replay on restart does not OOM.
            memory: 2Gi
            ephemeral-storage: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: openebs-hostpath
              resources:
                requests:
                  # openebs-hostpath shares the node filesystem and does not hard
                  # enforce this, but the larger request gives the WAL room to
                  # spike without driving the node into DiskPressure eviction.
                  storage: 25Gi

        podAntiAffinity: soft
        podAntiAffinityTopologyKey: kubernetes.io/hostname
        scrapeInterval: 1m # Must match interval in Grafana Helm chart
        additionalScrapeConfigsSecret:
          enabled: false
          # name: prometheus-additional-scrape-configs
          # key: additionalScrapeConfigs

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node

    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 256M
        limits:
          memory: 384M

    kube-state-metrics:
      enabled: true
      # Config specified in ./resources/kube-state-metrics.yaml

    grafana:
      enabled: false # manage by itself
      forceDeployDashboards: true
      sidecar:
        dashboards:
          annotations:
            grafana_folder: Prometheus
          multicluster:
            etcd:
              enabled: true
