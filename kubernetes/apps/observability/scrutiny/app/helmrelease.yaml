---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scrutiny
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      scrutiny:
        annotations:
          reloader.stakater.com/auto: "true"
        # openebs-hostpath is RWO/node-local, so avoid a second pod racing for
        # the volume during rollouts.
        strategy: Recreate
        containers:
          app:
            # Omnibus bundles the web UI/API and an embedded InfluxDB. The
            # k8s nodes are VMs with no real disks — SMART data comes from
            # external collectors on the NAS and PVE hosts pushing to the API.
            image:
              # starosdev fork (not analogj/scrutiny): it adds MegaRAID/HBA
              # auto-detection the NAS drives need, and its device-registration
              # schema (smart_support as an object) differs from analogj's, so
              # hub and collector MUST be the same fork+version. The NAS
              # collector template must track ghcr.io/starosdev/scrutiny at the
              # matching -collector tag.
              repository: ghcr.io/starosdev/scrutiny
              tag: 1.9.0-omnibus@sha256:0eb55a85a0a6fc8a421aee6c20f0aced71084f4076ece48803473831b38aab74
            env:
              TZ: America/Chicago
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              # Embedded InfluxDB first-run init takes a while; without a
              # startup grace the liveness probe kills the pod mid-init.
              startup:
                enabled: true
                spec:
                  periodSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 15m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: scrutiny
        ports:
          http:
            port: 8080
    persistence:
      data:
        existingClaim: scrutiny-data
        globalMounts:
          - path: /opt/scrutiny/config
            subPath: config
          - path: /opt/scrutiny/influxdb
            subPath: influxdb
