---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scrutiny
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      scrutiny:
        annotations:
          reloader.stakater.com/auto: "true"
        # openebs-hostpath is RWO/node-local, so avoid a second pod racing for
        # the volume during rollouts.
        strategy: Recreate
        containers:
          app:
            # Omnibus bundles the web UI/API and an embedded InfluxDB. The
            # k8s nodes are VMs with no real disks — SMART data comes from
            # external collectors on the NAS and PVE hosts pushing to the API.
            image:
              # starosdev fork (not analogj/scrutiny): adds MegaRAID/HBA
              # auto-detection the NAS drives need. Must be the fork, not
              # analogj, or device registration 400s on a schema mismatch.
              # Pinned to latest-omnibus (master build): the tagged 1.9.0
              # release types smart_support as a bool and rejects NVMe drives,
              # whose collector sends it as an object. master's SmartSupport
              # has a flexible UnmarshalJSON that accepts both bool and object,
              # so NVMe (PVE) and SATA (NAS) both register.
              repository: ghcr.io/starosdev/scrutiny
              tag: latest-omnibus@sha256:23bbc9ff906a5fb6ad2a4430fbdb53bde730d5c7f327be6941b41176c81e7a60
            env:
              TZ: America/Chicago
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              # Embedded InfluxDB first-run init takes a while; without a
              # startup grace the liveness probe kills the pod mid-init.
              startup:
                enabled: true
                spec:
                  periodSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 15m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: scrutiny
        ports:
          http:
            port: 8080
    persistence:
      data:
        existingClaim: scrutiny-data
        globalMounts:
          - path: /opt/scrutiny/config
            subPath: config
          - path: /opt/scrutiny/influxdb
            subPath: influxdb
