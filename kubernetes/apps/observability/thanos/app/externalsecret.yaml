apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name thanos-secret
  namespace: observability
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        accesskey: '{{ index . "garage-accesskey" }}'
        secretkey: '{{ index . "garage-secretkey" }}'
  dataFrom:
    - extract:
        key: *name
