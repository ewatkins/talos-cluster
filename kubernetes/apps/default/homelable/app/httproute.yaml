---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelable
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.ewatkins.dev"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Homelable"
    gethomepage.dev/description: "Network visualization"
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "mdi-lan"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames:
    - "homelab.ewatkins.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Strict-Transport-Security
                value: "max-age=31449600; includeSubDomains"
      backendRefs:
        - name: homelable
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homelable-mcp
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.ewatkins.dev"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames:
    - "homelab-mcp.ewatkins.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homelable
          port: 8001
