---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app homelable
  namespace: &namespace default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      homelable:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/pouzor/homelable-backend
              tag: 3.1.1@sha256:a9a0d2f1fbe785e6548ae93de9ffed215fbded44aca0c168b8f3943aefdbd94e
            env:
              TZ: ${TIMEZONE}
              SQLITE_PATH: /app/data/homelab.db
              CORS_ORIGINS: '["https://homelab.ewatkins.dev"]'
              SCANNER_RANGES: '["10.40.0.0/24","10.40.1.0/24"]'
            envFrom:
              - secretRef:
                  name: homelable-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
            securityContext:
              # PSS baseline forbids adding NET_RAW; run unprivileged instead —
              # nmap falls back to TCP-connect scans and ping uses ICMP datagram
              # sockets via the ping_group_range sysctl below.
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
          frontend:
            image:
              repository: ghcr.io/pouzor/homelable-frontend
              tag: 3.1.1@sha256:83c5667771dcfaa7255366a311ba2777deceb9b5066832e4a212484aee804975
            securityContext:
              allowPrivilegeEscalation: false
            resources:
              requests:
                cpu: 5m
              limits:
                memory: 128Mi
          mcp:
            image:
              repository: ghcr.io/pouzor/homelable-mcp
              tag: 3.1.1@sha256:d75b414b4a3dee035815814bb728de008c686426f3da0eb7d41a8adc4d0dca76
            env:
              TZ: ${TIMEZONE}
              BACKEND_URL: http://127.0.0.1:8000
            envFrom:
              - secretRef:
                  name: homelable-secret
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 5m
              limits:
                memory: 256Mi
    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        sysctls:
          # Allow unprivileged ICMP echo (ping status checks) without NET_RAW
          - name: net.ipv4.ping_group_range
            value: "0 2147483647"
    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
          api:
            port: 8000
          mcp:
            port: 8001
    persistence:
      data:
        existingClaim: homelable-data
        advancedMounts:
          homelable:
            app:
              - path: /app/data
      nginx-conf:
        type: configMap
        name: homelable-nginx
        advancedMounts:
          homelable:
            frontend:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
                readOnly: true
