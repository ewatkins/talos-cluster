---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: default
data:
  settings.yaml: |
    title: Great Lakes
    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true
    background:
      image: https://images.unsplash.com/photo-1542810444-515316abdc7a?w=1920&q=85&fit=crop
      blur: md
      saturate: 150
      brightness: 50
      opacity: 100
    cardBlur: sm
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
    layout:
      Hypervisors:
        style: row
        columns: 3
        header: false
      Stats:
        style: row
        columns: 3
        header: false
      Streaming:
        style: row
        columns: 2
        header: false
      Requests:
        style: row
        columns: 3
        header: false
      Pipeline:
        style: row
        columns: 4
        header: false
      Monitoring:
        style: row
        columns: 3
        header: false
      Workspace:
        style: row
        columns: 2
        header: false
      Services:
        style: row
        columns: 4
        header: false
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  widgets.yaml: |
    - greeting:
        text_size: 2xl
        text: Great Lakes
    - openmeteo:
        label: Current
        latitude: 41.9779
        longitude: -91.6656
        timezone: America/Chicago
        units: imperial
        cache: 5
  services.yaml: |
    - Hypervisors:
        - pve01:
            icon: proxmox
            widget:
              type: glances
              url: http://10.35.1.1:61208
              version: 4
              metric: info
              chart: true
        - pve02:
            icon: proxmox
            widget:
              type: glances
              url: http://10.35.1.2:61208
              version: 4
              metric: info
              chart: true
        - pve03:
            icon: proxmox
            widget:
              type: glances
              url: http://10.35.1.3:61208
              version: 4
              metric: info
              chart: true
    - Stats:
        - NAS:
            href: https://caspian.ewatkins.dev
            icon: unraid
            widget:
              type: glances
              url: http://10.35.10.10:61208
              version: 4
              metric: fs:/rootfs/mnt/user
              chart: false
        - Internal:
            widget:
              type: glances
              url: http://10.35.10.10:61208
              version: 4
              metric: network:bond0
              chart: false
        - External:
            widget:
              type: glances
              url: http://10.35.10.10:61208
              version: 4
              metric: network:bond1
              chart: false
    - Streaming:
        - Jellyfin:
            href: https://jellyfin.ewatkins.dev
            description: Watch movies and TV shows.
            icon: jellyfin
            namespace: media
            app: jellyfin
            widget:
              type: jellyfin
              url: https://jellyfin.ewatkins.dev
              key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
              enableBlocks: true
              enableNowPlaying: true
        - Immich:
            href: https://photos.ewatkins.dev
            description: Photo and video library.
            icon: immich
            namespace: media
            app: immich
            widget:
              type: immich
              url: https://photos.ewatkins.dev
              key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
              version: 2
    - Requests:
        - Requests:
            href: https://requests.ewatkins.dev
            description: Request movies and TV shows.
            icon: jellyseerr
            namespace: media
            app: seerr
            widget:
              type: jellyseerr
              url: https://requests.ewatkins.dev
              key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"
        - Radarr:
            href: https://radarr.ewatkins.dev
            description: Request and manage movies.
            icon: radarr
            namespace: media
            app: radarr
            widget:
              type: radarr
              url: https://radarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Sonarr:
            href: https://sonarr.ewatkins.dev
            description: Request and manage TV shows.
            icon: sonarr
            namespace: media
            app: sonarr
            widget:
              type: sonarr
              url: https://sonarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    - Pipeline:
        - SABnzbd:
            href: https://sab.ewatkins.dev
            description: Usenet downloader.
            icon: sabnzbd
            widget:
              type: sabnzbd
              url: https://sab.ewatkins.dev
              key: "{{HOMEPAGE_VAR_SABNZBD_KEY}}"
        - Prowlarr:
            href: https://prowlarr.ewatkins.dev
            description: Tracker and indexer manager.
            icon: prowlarr
            namespace: media
            app: prowlarr
            widget:
              type: prowlarr
              url: https://prowlarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - Bazarr:
            href: https://bazarr.ewatkins.dev
            description: Subtitle management.
            icon: bazarr
            namespace: media
            app: bazarr
            widget:
              type: bazarr
              url: https://bazarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"
        - Tdarr:
            href: https://tdarr.ewatkins.dev
            description: Distributed transcoding.
            icon: tdarr
            namespace: media
            app: tdarr
            widget:
              type: tdarr
              url: https://tdarr.ewatkins.dev
    - Monitoring:
        - Grafana:
            href: https://grafana.ewatkins.dev
            description: Metrics dashboards.
            icon: grafana
            namespace: observability
            app: grafana
            widget:
              type: grafana
              url: https://grafana.ewatkins.dev
              username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"
        - Gatus:
            href: https://status.ewatkins.dev
            description: Uptime monitoring.
            icon: gatus
            namespace: observability
            app: gatus
            widget:
              type: gatus
              url: https://status.ewatkins.dev
        - Pulse:
            href: https://pulse.ewatkins.dev
            description: Proxmox monitoring.
            icon: mdi-heart-pulse
            namespace: observability
            app: pulse
    - Workspace:
        - Paperless:
            href: https://paperless.ewatkins.dev
            description: Document management.
            icon: paperless-ngx
            namespace: media
            app: paperless
            widget:
              type: paperlessngx
              url: https://paperless.ewatkins.dev
              key: "{{HOMEPAGE_VAR_PAPERLESS_KEY}}"
        - Open WebUI:
            href: https://chat.ewatkins.dev
            description: AI chat.
            icon: open-webui
            namespace: ai
            app: open-webui
    - Services:
        - Outline:
            href: https://notes.ewatkins.dev
            description: Wiki & notes
            icon: outline
            namespace: default
            app: outline
        - Recommendarr:
            href: https://recommend.ewatkins.dev
            description: Media recommendations
            icon: mdi-movie-search
            namespace: media
            app: recommendarr
        - Notifiarr:
            href: https://notifiarr.ewatkins.dev
            description: Notifications
            icon: notifiarr
            namespace: media
            app: notifiarr
        - Thanos:
            href: https://thanos.ewatkins.dev
            description: Long-term metrics
            icon: thanos
            namespace: observability
            app: thanos
        - Goldilocks:
            href: https://goldilocks.ewatkins.dev
            description: Resource recommendations
            icon: mdi-scale-balance
            namespace: observability
            app: goldilocks
        - Kromgo:
            href: https://kromgo.ewatkins.dev
            description: Metrics badges
            icon: mdi-chart-box
            namespace: observability
            app: kromgo
        - Keycloak:
            href: https://keycloak.ewatkins.dev
            description: Identity & SSO
            icon: keycloak
            namespace: security
            app: keycloak
        - Forgejo:
            href: https://git.ewatkins.dev
            description: Git hosting
            icon: forgejo
            namespace: development
            app: forgejo
        - Minio:
            href: https://minio.ewatkins.dev
            description: Object storage
            icon: minio
            namespace: storage
            app: minio
        - RedisInsight:
            href: https://redis.ewatkins.dev
            description: Redis GUI
            icon: redis
            namespace: database
            app: redisinsight
        - MaxScale:
            href: https://maxscale.ewatkins.dev
            description: MariaDB proxy
            icon: mariadb
            namespace: database
            app: maxscale
        - Trek:
            href: https://trek.ewatkins.dev
            description: GitOps release tracking
            icon: mdi-map-marker-path
            namespace: default
            app: trek
            pod_selector: app=trek
        - Homelable:
            href: https://homelab.ewatkins.dev
            description: Homelab inventory
            icon: mdi-label
            namespace: default
            app: homelable
        - Cluster Repo:
            href: https://github.com/ewatkins/talos-cluster
            description: GitOps source
            icon: github
  bookmarks.yaml: ""
  docker.yaml: ""
