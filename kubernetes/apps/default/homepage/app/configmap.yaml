---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: default
data:
  settings.yaml: |
    title: Great Lakes
    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true
    useEqualHeights: true
    background:
      image: https://images.unsplash.com/photo-1542810444-515316abdc7a?w=1920&q=85&fit=crop
      blur: md
      saturate: 150
      brightness: 50
      opacity: 100
    cardBlur: sm
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
    layout:
      # Overview — at-a-glance health
      Hypervisors:
        style: row
        columns: 3
        header: false
      Stats:
        style: row
        columns: 3
        header: false
      Infrastructure:
        style: row
        columns: 2
        header: false
      # Web IDE + Outline in a row directly above Monitoring
      Workspace:
        style: row
        columns: 2
        header: false
      Monitoring:
        style: row
        columns: 3
        header: false
      # Media — what you watch, plus the *arr chain behind it
      Media:
        style: row
        columns: 3
        header: false
      Automation:
        style: row
        columns: 3
        header: false
      # Apps — productivity + dev
      Apps:
        style: row
        columns: 2
        header: false
      # Grafana + Paperless, just above Media Tools
      Reports:
        style: row
        columns: 2
        header: false
      # Media Tools — media-stack backends, parked at the bottom
      Media Tools:
        style: row
        columns: 3
        header: false
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  widgets.yaml: |
    - greeting:
        text_size: 2xl
        text: Great Lakes
    - openmeteo:
        label: Current
        latitude: 41.9779
        longitude: -91.6656
        timezone: America/Chicago
        units: imperial
        cache: 5
    # Cluster Repo as a header link; custom.css floats it right, beside the weather
    - logo:
        icon: github-light
        href: https://github.com/ewatkins/talos-cluster
        target: _blank
  services.yaml: |
    - Hypervisors:
        - pve01:
            href: https://pve01.ewatkins.dev
            icon: proxmox
            widget:
              type: glances
              url: http://10.35.1.1:61208
              version: 4
              metric: info
              chart: true
        - pve02:
            href: https://pve02.ewatkins.dev
            icon: proxmox
            widget:
              type: glances
              url: http://10.35.1.2:61208
              version: 4
              metric: info
              chart: true
        - pve03:
            href: https://pve03.ewatkins.dev
            icon: proxmox
            widget:
              type: glances
              url: http://10.35.1.3:61208
              version: 4
              metric: info
              chart: true
    - Stats:
        - NAS - Caspian:
            href: https://caspian.ewatkins.dev
            icon: unraid
            widget:
              type: glances
              url: http://10.35.10.10:61208
              version: 4
              metric: fs:/rootfs/mnt/user
              chart: false
        - Internal:
            widget:
              type: glances
              url: http://10.35.10.10:61208
              version: 4
              metric: network:bond0
              chart: false
        - External:
            widget:
              type: glances
              url: http://10.35.10.10:61208
              version: 4
              metric: network:bond1
              chart: false
    - Infrastructure:
        - Proxmox:
            href: https://pve01.ewatkins.dev
            description: Virtualization cluster.
            icon: proxmox
            widget:
              type: proxmox
              url: https://pve01.ewatkins.dev
              username: "{{HOMEPAGE_VAR_PROXMOX_USER}}"
              password: "{{HOMEPAGE_VAR_PROXMOX_PASS}}"
        - Proxmox Backup Server:
            href: https://pbs.ewatkins.dev
            description: VM & container backups
            icon: proxmox-backup-server
            widget:
              type: proxmoxbackupserver
              url: https://pbs.ewatkins.dev
              username: "{{HOMEPAGE_VAR_PBS_USER}}"
              password: "{{HOMEPAGE_VAR_PBS_PASS}}"
    - Workspace:
        - Web IDE:
            href: https://code.ewatkins.dev
            icon: vscode
            namespace: development
            app: code-server
        - Outline:
            href: https://notes.ewatkins.dev
            icon: outline
            namespace: default
            app: outline
    - Monitoring:
        - Gatus:
            href: https://status.ewatkins.dev
            description: Uptime monitoring.
            icon: gatus
            namespace: observability
            app: gatus
            widget:
              type: gatus
              url: https://status.ewatkins.dev
        - UniFi:
            href: https://10.0.0.1
            description: Network controller.
            icon: unifi
            widget:
              type: unifi
              url: https://10.0.0.1
              key: "{{HOMEPAGE_VAR_UNIFI_KEY}}"
              fields: ["uptime", "wan", "lan_users", "wlan_users"]
        - MySpeed:
            href: https://myspeed.ewatkins.dev
            description: Internet speed history.
            icon: myspeed
            namespace: observability
            app: myspeed
            widget:
              type: myspeed
              url: https://myspeed.ewatkins.dev
              password: "{{HOMEPAGE_VAR_MYSPEED_PASSWORD}}"
    - Media:
        - Jellyfin:
            href: https://jellyfin.ewatkins.dev
            description: Watch movies and TV shows.
            icon: jellyfin
            namespace: media
            app: jellyfin
            widget:
              type: jellyfin
              url: https://jellyfin.ewatkins.dev
              key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
              enableBlocks: true
              enableNowPlaying: false
        - Requests:
            href: https://requests.ewatkins.dev
            description: Request movies and TV shows.
            icon: jellyseerr
            namespace: media
            app: seerr
            widget:
              type: jellyseerr
              url: https://requests.ewatkins.dev
              key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"
        - Immich:
            href: https://photos.ewatkins.dev
            description: Photo and video library.
            icon: immich
            namespace: media
            app: immich
            widget:
              type: immich
              url: https://photos.ewatkins.dev
              key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
              version: 2
    - Automation:
        - Radarr:
            href: https://radarr.ewatkins.dev
            description: Request and manage movies.
            icon: radarr
            namespace: media
            app: radarr
            widget:
              type: radarr
              url: https://radarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Sonarr:
            href: https://sonarr.ewatkins.dev
            description: Request and manage TV shows.
            icon: sonarr
            namespace: media
            app: sonarr
            widget:
              type: sonarr
              url: https://sonarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
        - SABnzbd:
            href: https://sab.ewatkins.dev
            description: Usenet downloader.
            icon: sabnzbd
            server: caspian
            container: sabnzbd
            widget:
              type: sabnzbd
              url: https://sab.ewatkins.dev
              key: "{{HOMEPAGE_VAR_SABNZBD_KEY}}"
    - Apps:
        - Open WebUI:
            href: https://chat.ewatkins.dev
            icon: open-webui
            namespace: ai
            app: open-webui
        - Trek:
            href: https://trek.ewatkins.dev
            icon: https://cdn.jsdelivr.net/gh/mauriceboe/TREK@main/client/public/icons/icon.svg
            namespace: default
            app: trek
        - Homelab:
            href: https://homelab.ewatkins.dev
            icon: homelable
            namespace: default
            app: homelable
        - Git:
            href: https://git.ewatkins.dev
            icon: forgejo
            namespace: development
            app: forgejo
            # Forgejo is API-compatible with Gitea, so homepage's gitea widget
            # works against it. Needs a read-scoped API token.
            widget:
              type: gitea
              url: https://git.ewatkins.dev
              key: "{{HOMEPAGE_VAR_GITEA_KEY}}"
        - Keycloak:
            href: https://keycloak.ewatkins.dev
            icon: keycloak
            namespace: security
            app: keycloak
        - NGINX Proxy Manager:
            href: https://proxy.ewatkins.dev
            icon: nginx-proxy-manager
            # Proxmox LXC (no container/pod to read a real status from). siteMonitor
            # gives a reachability badge; statusStyle:basic renders it as UP/DOWN
            # text, and custom.css relabels the up state to RUNNING to match the
            # Docker/k8s tiles.
            siteMonitor: https://proxy.ewatkins.dev
            statusStyle: basic
        - Garage:
            href: https://garage.ewatkins.dev
            icon: garage
            namespace: storage
            app: garage-webui
        - RedisInsight:
            href: https://redis.ewatkins.dev
            icon: redis
            namespace: database
            app: redisinsight
        - Goldilocks:
            href: https://goldilocks.ewatkins.dev
            icon: goldilocks
            namespace: observability
            app: goldilocks
        - Notifiarr:
            href: https://notifiarr.ewatkins.dev
            icon: notifiarr
            namespace: media
            app: notifiarr
    - Reports:
        - Grafana:
            href: https://grafana.ewatkins.dev
            description: Metrics dashboards.
            icon: grafana
            namespace: observability
            app: grafana
            widget:
              type: grafana
              url: https://grafana.ewatkins.dev
              username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"
        - Paperless:
            href: https://paperless.ewatkins.dev
            description: Document archive.
            icon: paperless-ngx
            namespace: media
            app: paperless
            widget:
              type: paperlessngx
              url: https://paperless.ewatkins.dev
              key: "{{HOMEPAGE_VAR_PAPERLESS_TOKEN}}"
    - Media Tools:
        - Prowlarr:
            href: https://prowlarr.ewatkins.dev
            description: Tracker and indexer manager.
            icon: prowlarr
            namespace: media
            app: prowlarr
            widget:
              type: prowlarr
              url: https://prowlarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - Bazarr:
            href: https://bazarr.ewatkins.dev
            description: Subtitle management.
            icon: bazarr
            namespace: media
            app: bazarr
            widget:
              type: bazarr
              url: https://bazarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"
        - Tdarr:
            href: https://tdarr.ewatkins.dev
            description: Distributed transcoding.
            icon: tdarr
            namespace: media
            app: tdarr
            widget:
              type: tdarr
              url: https://tdarr.ewatkins.dev
  bookmarks.yaml: ""
  docker.yaml: |
    # LinuxServer socket-proxy on the NAS (read-only; CONTAINERS=1). The pod
    # reaches the NAS by IP — caspian.ewatkins.dev resolves to the reverse proxy.
    caspian:
      host: 10.35.10.10
      port: 2375
