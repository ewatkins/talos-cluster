---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: default
data:
  settings.yaml: |
    title: Great Lakes
    theme: dark
    color: slate
    headerStyle: boxed
    statusStyle: dot
    hideVersion: true
    background:
      image: https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=2560&q=80
      blur: sm
      saturate: 100
      brightness: 50
      opacity: 100
    cardBlur: md
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
    layout:
      Streaming:
        style: row
        columns: 2
        header: false
      Requests:
        style: row
        columns: 3
        header: false
      Pipeline:
        style: row
        columns: 3
        header: false
      Monitoring:
        style: row
        columns: 3
        header: false
      Workspace:
        style: row
        columns: 2
        header: false
      Services:
        style: row
        columns: 4
        header: false
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: great-lakes
        nodes:
          show: false
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: long
  services.yaml: |
    - Streaming:
        - Jellyfin:
            href: https://jellyfin.ewatkins.dev
            description: Watch movies and TV shows.
            icon: jellyfin
            siteMonitor: https://jellyfin.ewatkins.dev
            widget:
              type: jellyfin
              url: https://jellyfin.ewatkins.dev
              key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
              enableBlocks: true
              enableNowPlaying: true
        - Immich:
            href: https://photos.ewatkins.dev
            description: Photo and video library.
            icon: immich
            siteMonitor: https://photos.ewatkins.dev
            widget:
              type: immich
              url: https://photos.ewatkins.dev
              key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
              version: 2
    - Requests:
        - Requests:
            href: https://requests.ewatkins.dev
            description: Request movies and TV shows.
            icon: jellyseerr
            siteMonitor: https://requests.ewatkins.dev
            widget:
              type: jellyseerr
              url: https://requests.ewatkins.dev
              key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"
        - Radarr:
            href: https://radarr.ewatkins.dev
            description: Request and manage movies.
            icon: radarr
            siteMonitor: https://radarr.ewatkins.dev
            widget:
              type: radarr
              url: https://radarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Sonarr:
            href: https://sonarr.ewatkins.dev
            description: Request and manage TV shows.
            icon: sonarr
            siteMonitor: https://sonarr.ewatkins.dev
            widget:
              type: sonarr
              url: https://sonarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    - Pipeline:
        - Prowlarr:
            href: https://prowlarr.ewatkins.dev
            description: Tracker and indexer manager.
            icon: prowlarr
            siteMonitor: https://prowlarr.ewatkins.dev
            widget:
              type: prowlarr
              url: https://prowlarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - Bazarr:
            href: https://bazarr.ewatkins.dev
            description: Subtitle management.
            icon: bazarr
            siteMonitor: https://bazarr.ewatkins.dev
            widget:
              type: bazarr
              url: https://bazarr.ewatkins.dev
              key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"
        - Tdarr:
            href: https://tdarr.ewatkins.dev
            description: Distributed transcoding.
            icon: tdarr
            siteMonitor: https://tdarr.ewatkins.dev
            widget:
              type: tdarr
              url: https://tdarr.ewatkins.dev
    - Monitoring:
        - Grafana:
            href: https://grafana.ewatkins.dev
            description: Metrics dashboards.
            icon: grafana
            siteMonitor: https://grafana.ewatkins.dev
            widget:
              type: grafana
              url: https://grafana.ewatkins.dev
              username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"
        - Gatus:
            href: https://status.ewatkins.dev
            description: Uptime monitoring.
            icon: gatus
            siteMonitor: https://status.ewatkins.dev
            widget:
              type: gatus
              url: https://status.ewatkins.dev
        - Pulse:
            href: https://pulse.ewatkins.dev
            description: Proxmox monitoring.
            icon: mdi-heart-pulse
            siteMonitor: https://pulse.ewatkins.dev
    - Workspace:
        - Paperless:
            href: https://paperless.ewatkins.dev
            description: Document management.
            icon: paperless-ngx
            siteMonitor: https://paperless.ewatkins.dev
            widget:
              type: paperlessngx
              url: https://paperless.ewatkins.dev
              key: "{{HOMEPAGE_VAR_PAPERLESS_KEY}}"
        - Open WebUI:
            href: https://chat.ewatkins.dev
            description: AI chat.
            icon: open-webui
            siteMonitor: https://chat.ewatkins.dev
    - Services:
        - Outline:
            href: https://notes.ewatkins.dev
            description: Wiki & notes
            icon: outline
            siteMonitor: https://notes.ewatkins.dev
        - Recommendarr:
            href: https://recommend.ewatkins.dev
            description: Media recommendations
            icon: mdi-movie-search
            siteMonitor: https://recommend.ewatkins.dev
        - Notifiarr:
            href: https://notifiarr.ewatkins.dev
            description: Notifications
            icon: notifiarr
            siteMonitor: https://notifiarr.ewatkins.dev
        - Thanos:
            href: https://thanos.ewatkins.dev
            description: Long-term metrics
            icon: thanos
            siteMonitor: https://thanos.ewatkins.dev
        - Goldilocks:
            href: https://goldilocks.ewatkins.dev
            description: Resource recommendations
            icon: mdi-scale-balance
            siteMonitor: https://goldilocks.ewatkins.dev
        - Kromgo:
            href: https://kromgo.ewatkins.dev
            description: Metrics badges
            icon: mdi-chart-box
            siteMonitor: https://kromgo.ewatkins.dev
        - Keycloak:
            href: https://keycloak.ewatkins.dev
            description: Identity & SSO
            icon: keycloak
            siteMonitor: https://keycloak.ewatkins.dev
        - Forgejo:
            href: https://git.ewatkins.dev
            description: Git hosting
            icon: forgejo
            siteMonitor: https://git.ewatkins.dev
        - Minio:
            href: https://minio.ewatkins.dev
            description: Object storage
            icon: minio
            siteMonitor: https://minio.ewatkins.dev
        - RedisInsight:
            href: https://redis.ewatkins.dev
            description: Redis GUI
            icon: redis
            siteMonitor: https://redis.ewatkins.dev
        - MaxScale:
            href: https://maxscale.ewatkins.dev
            description: MariaDB proxy
            icon: mariadb
            siteMonitor: https://maxscale.ewatkins.dev
        - Trek:
            href: https://trek.ewatkins.dev
            description: GitOps release tracking
            icon: mdi-map-marker-path
            siteMonitor: https://trek.ewatkins.dev
        - Homarr:
            href: https://home.ewatkins.dev
            description: Dashboard
            icon: homarr
            siteMonitor: https://home.ewatkins.dev
        - Homelable:
            href: https://homelab.ewatkins.dev
            description: Homelab inventory
            icon: mdi-label
            siteMonitor: https://homelab.ewatkins.dev
        - Cluster Repo:
            href: https://github.com/ewatkins/talos-cluster
            description: GitOps source
            icon: github
  bookmarks.yaml: ""
  docker.yaml: ""
