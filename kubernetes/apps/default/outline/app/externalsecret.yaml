---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name outline-secret
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        SECRET_KEY: "{{ .secret_key }}"
        UTILS_SECRET: "{{ .utils_secret }}"
        OIDC_CLIENT_SECRET: "{{ .client_secret }}"
        OIDC_AUTH_URI: "{{ .auth_uri }}"
        OIDC_TOKEN_URI: "{{ .token_uri }}"
        OIDC_USERINFO_URI: "{{ .userinfo_uri }}"
        OIDC_LOGOUT_URI: "{{ .logout_uri }}"
        # Garage creds from the garage-* Bitwarden fields; iDrive e2 creds are
        # retained in the item for rollback. Non-secret endpoint/region are literals.
        AWS_ACCESS_KEY_ID: '{{ index . "garage-access-key-id" }}'
        AWS_SECRET_ACCESS_KEY: '{{ index . "garage-secret-access-key" }}'
        AWS_S3_UPLOAD_BUCKET_URL: "https://s3-garage.ewatkins.dev"
        AWS_S3_UPLOAD_BUCKET_NAME: "{{ .bucket_name }}"
        AWS_REGION: "us-east-1"
  dataFrom:
    - extract:
        key: *name
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name outline-smtp
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        SMTP_HOST: "{{ .smtp_host }}"
        SMTP_PORT: "{{ .smtp_port }}"
        SMTP_USERNAME: "{{ .smtp_username }}"
        SMTP_PASSWORD: "{{ .smtp_password }}"
        SMTP_SECURE: "{{ .smtp_secure }}"
  dataFrom:
    - extract:
        key: smtp
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name outline-db
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-postgres
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "postgresql://{{ index . \"user\" }}:{{ index . \"password\" }}@{{ index . \"pgbouncer-host\" }}:{{ index . \"pgbouncer-port\" }}/{{ index . \"dbname\" }}"
  dataFrom:
    - extract:
        key: crunchy-postgres-pguser-outline-admin
