---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: outline
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      outline:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          migrate:
            image:
              repository: outlinewiki/outline
              tag: 1.5.0
            command: [node, ./build/server/scripts/seed.js]
            envFrom: &envFrom
              - secretRef:
                  name: outline-secret
              - secretRef:
                  name: outline-db
        containers:
          app:
            image:
              repository: outlinewiki/outline
              tag: 1.5.0
            env:
              URL: "https://notes.ewatkins.dev"
              PORT: "3000"
              REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379"
              FORCE_HTTPS: "false"
              ENABLE_UPDATES: "false"
              DEFAULT_LANGUAGE: en_US
              PGSSLMODE: disable
              AWS_S3_ACL: private
              AWS_S3_FORCE_PATH_STYLE: "false"
              OIDC_CLIENT_ID: outline
              OIDC_DISPLAY_NAME: Keycloak
              OIDC_USERNAME_CLAIM: preferred_username
              OIDC_SCOPES: "openid profile email"
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: outline
        ports:
          http:
            port: 3000
