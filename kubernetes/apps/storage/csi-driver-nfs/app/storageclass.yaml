apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-fast
provisioner: nfs.csi.k8s.io
parameters:
  server: storage.ewatkins.dev
  share: /mnt/user/kubernetes-fast
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions:
  - nfsvers=4.2
  - nconnect=16
  - hard
  - timeo=600
  - retrans=5
  - noatime
allowVolumeExpansion: true
