---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-gatus-ep
  labels:
    gatus.io/enabled: "true"
data:
  config.yaml: |
    endpoints:
      - name: minio
        group: Internal
        url: https://minio.ewatkins.dev
        interval: 1m
        conditions:
          - "[STATUS] == 200"
