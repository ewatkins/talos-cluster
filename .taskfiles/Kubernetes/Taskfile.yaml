---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  KUBECONFORM_SCRIPT: "{{.SCRIPTS_DIR}}/kubeconform.sh"

tasks:
  resources:
    desc: Gather common resources in your cluster, useful when asking for support
    cmds:
      - for: { var: resource }
        cmd: kubecolor get {{.ITEM}} {{.CLI_ARGS | default "-A"}}
    vars:
      resource:
        [
          "nodes -o wide",
          "gitrepositories",
          "kustomizations",
          "helmrepositories",
          "helmreleases",
          "certificates -o wide",
          "certificaterequests -o wide",
          "ingresses",
          "services",
          "pods -o wide",
        ]

  validate:
    desc: Validate Kubernetes manifests with kubeconform
    cmd: bash {{.KUBECONFORM_SCRIPT}} {{.KUBERNETES_DIR}}
    preconditions:
      - {
          msg: "Missing kubeconform script",
          sh: "test -f {{.KUBECONFORM_SCRIPT}}",
        }

  browse-pvc:
    desc: Browse PersistentVolumeClaims
    summary: |
      Args:
        ns: Namespace to browse PersistentVolumeClaims in (default: default)
        claim: PersistentVolumeClaim to browse (required)
    interactive: true
    cmd: kubectl browse-pvc --namespace {{.ns}} {{.claim}}
    vars:
      ns: '{{.ns | default "default"}}'
    requires:
      vars: ["claim"]

  drain:
    desc: Drain a node
    summary: |
      Args:
        node: Node to drain (required)
    vars:
      NODE: "{{.CLI_ARGS | default .node}}"
    cmds:
      - kubecolor drain {{.NODE}} --ignore-daemonsets --delete-emptydir-data

  restart-crashing:
    desc: Rollout restart all deployments/statefulsets/daemonsets with pods that have restarted
    summary: |
      Args:
        namespace: Namespace to filter (optional, default: all namespaces)
    vars:
      NAMESPACE: "{{.CLI_ARGS | default .namespace}}"
    cmds:
      - |
        {{if .NAMESPACE}}
        kubectl get pods -n {{.NAMESPACE}} --no-headers | awk '$5 != "0"' | while read pod ready status restarts age; do
          ns={{.NAMESPACE}}
        {{else}}
        kubectl get pods -A --no-headers | awk '$5 != "0"' | while read ns pod ready status restarts age; do
          if kubectl -n "$ns" get pod "$pod" -o jsonpath='{.metadata.labels}' 2>/dev/null | grep -q "postgres-operator.crunchydata.com"; then
            continue
          fi
        {{end}}
          owner_kind=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{.metadata.ownerReferences[0].kind}' 2>/dev/null)
          owner_name=$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{.metadata.ownerReferences[0].name}' 2>/dev/null)
          if [ "$owner_kind" = "ReplicaSet" ]; then
            deploy=$(kubectl -n "$ns" get rs "$owner_name" -o jsonpath='{.metadata.ownerReferences[0].name}' 2>/dev/null)
            echo "deployment/$deploy ($ns)"
          elif [ "$owner_kind" = "StatefulSet" ]; then
            echo "statefulset/$owner_name ($ns)"
          elif [ "$owner_kind" = "DaemonSet" ]; then
            echo "daemonset/$owner_name ($ns)"
          fi
        done | sort -u | while IFS=' ()' read resource ns _; do
          echo "Restarting $resource in $ns"
          kubectl -n "$ns" rollout restart "$resource"
          kubectl -n "$ns" rollout status "$resource" 2>/dev/null || true
        done

  clear-failed:
    desc: Deletes pods with a failed status
    cmds:
      - for: ["Evicted", "Failed", "Succeeded"]
        cmd: kubecolor delete pods --field-selector status.phase={{.ITEM}} -A --ignore-not-found=true

  # https://docs.github.com/en/enterprise-cloud@latest/actions/hosting-your-own-runners/managing-self-hosted-runners-with-actions-runner-controller/deploying-runner-scale-sets-with-actions-runner-controller#upgrading-arc
  upgrade-arc:
    desc: Upgrade the ARC
    cmds:
      - helm -n actions-runner-system uninstall talos-runner
      - helm -n actions-runner-system uninstall actions-runner-controller
      - sleep 5
      - flux -n actions-runner-system reconcile hr actions-runner-controller
      - flux -n actions-runner-system reconcile hr talos-runner
    preconditions:
      - which flux helm
